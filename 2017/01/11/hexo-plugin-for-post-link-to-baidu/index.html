<!DOCTYPE html><html lang="zh-cn"><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> hexo plugin for post link to baidu · Hexo Blog</title><meta name="description" content="hexo plugin for post link to baidu - jiemin"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="https://jiemin.in/atom.xml" title="Hexo Blog"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="http://weibo.com/jiemin4j" target="_blank" class="nav-list-link">WEIBO</a></li><li class="nav-list-item"><a href="https://github.com/yjm9898" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">hexo plugin for post link to baidu</h1><div class="post-info">2017年1月11日</div><div class="post-content"><h1 id="Hexo-给百度主动提交链接"><a href="#Hexo-给百度主动提交链接" class="headerlink" title="Hexo 给百度主动提交链接"></a>Hexo 给百度主动提交链接</h1><blockquote>
<p>由于博客托管在github上，导致博客无法被百度收录。 借助万能的google,找到了这款插件<code>hexo-baidu-url-submit</code></p>
</blockquote>
<p>下面开始实践：</p>
<ul>
<li>1.在博客根目录安装插件</li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div></pre></td><td class="code"><pre><div class="line">npm install hexo-baidu-url-submit --save</div></pre></td></tr></table></figure>
<ul>
<li>2.修改_config.yml<br>在末尾添加<figure class="highlight yml"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div></pre></td><td class="code"><pre><div class="line"><span class="attr">deploy:</span></div><div class="line"><span class="attr">- type:</span> git</div><div class="line"><span class="attr">  repo:</span> https://github.com/XXX/XXX.github.io.git</div><div class="line"><span class="attr">  branch:</span> master</div><div class="line"><span class="attr">- type:</span> baidu_url_submitter</div><div class="line"></div><div class="line"><span class="attr">baidu_url_submit:</span></div><div class="line"><span class="attr">  count:</span> <span class="number">3</span> <span class="comment">## 比如3，代表提交最新的三个链接</span></div><div class="line"><span class="attr">  host:</span> jiemin.in <span class="comment">## 在百度站长平台中注册的域名</span></div><div class="line"><span class="attr">  token:</span> your_token <span class="comment">## 请注意这是您的秘钥， 请不要发布在公众仓库里!</span></div><div class="line"><span class="attr">  path:</span> baidu_urls.txt <span class="comment">## 文本文档的地址， 新链接会保存在此文本文档里</span></div></pre></td></tr></table></figure>
</li>
</ul>
